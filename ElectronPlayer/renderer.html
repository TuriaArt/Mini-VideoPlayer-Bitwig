<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0;
            will-change: opacity;
        }

        .layer video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .layer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Индикатор состояния */
        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.3s;
        }

        #status.hidden {
            opacity: 0;
        }

        /* Прогресс-бар */
        #progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            width: 0%;
            transition: width 0.1s linear;
            z-index: 100;
        }

        /* Счётчик */
        #counter {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        /* Загрузка */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 18px;
            z-index: 200;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="stage">
        <div id="layerA" class="layer"></div>
        <div id="layerB" class="layer"></div>
        <div id="loading">
            <div class="spinner"></div>
            <div>Ожидание команд от Bitwig...</div>
        </div>
        <div id="status" class="hidden">Готов</div>
        <div id="counter"></div>
        <div id="progress"></div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
